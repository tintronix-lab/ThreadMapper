apiVersion: ssu/v1
nlu:
  shortcuts:
    bundleIdentifier: com.tintronixlab.ThreadMapper
    intents:
    - metadata:
        name: GetNetworkHealthIntent_0
        title: Check Thread Network Health
      corpuses:
        training:
        - locale: en
          utterances:
          - '{${+prefix} }Check my Thread network in ${+applicationName}'
          - '{${+prefix} }What''s my network health in ${+applicationName}'
          - '{${+prefix} }Network health in ${+applicationName}'
    - metadata:
        name: GetOfflineDevicesIntent_1
        title: Show Offline Thread Devices
      corpuses:
        training:
        - locale: en
          utterances:
          - '{${+prefix} }Which devices are offline in ${+applicationName}'
          - '{${+prefix} }Show offline devices in ${+applicationName}'
          - '{${+prefix} }Are any devices offline in ${+applicationName}'
    - metadata:
        name: +negative
      corpuses:
        training:
        - locale: en
          utterances:
          - '{${+prefix} }${+standardAppShortcutNegatives}'
variables:
- name: +applicationName
  type: ssu/expansion
  definitions:
  - locale: en
    synomyms:
    - ThreadMapper
- name: +prefix
  type: ssu/expansion
  definitions:
  - locale: en
    synomyms:
      $ref: ssu://Resources/prefix/en.yaml
- name: +standardAppShortcutNegatives
  type: ssu/expansion
  definitions:
  - locale: en
    synomyms:
      $ref: ssu://Resources/standardAppShortcutNegatives/en.yaml
