name: ThreadMapper
options:
  bundleIdPrefix: com.tintronixlab
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  minimumXcodeGenVersion: "2.20"
  xcodeVersion: "15.0"
  developmentLanguage: en
  knownRegions:
    - Base
    - en
    - sv

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "3"
    SWIFT_VERSION: "5"
    SWIFT_STRICT_CONCURRENCY: complete
    CODE_SIGN_STYLE: "Automatic"
    DEVELOPMENT_TEAM: QCSX955Y7P

configs:
  Debug: debug
  Release: release

targets:
  ThreadMapper:
    type: application
    platform: iOS
    sources:
      - Sources/ThreadMapper
      - Sources/ThreadMapperApp
      - Sources/Shared
      - ThreadMapper.storekit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tintronixlab.ThreadMapper
        INFOPLIST_FILE: Sources/ThreadMapper/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/ThreadMapper/ThreadMapper.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOLS: YES
      signing:
        style: automatic
        team: QCSX955Y7P
    dependencies:
      - target: ThreadMapperWidget
        embed: true
      - target: ThreadMapperWatch
        embed: true
    scheme:
      shared: true
      testTargets:
        - ThreadMapperTests
      run:
        storeKitConfiguration: ThreadMapper.storekit
      test:
        storeKitConfiguration: ThreadMapper.storekit

  ThreadMapperWidget:
    type: app-extension
    platform: iOS
    sources:
      - Sources/ThreadMapperWidget
      - Sources/Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tintronixlab.ThreadMapper.widget
        INFOPLIST_FILE: Sources/ThreadMapperWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/ThreadMapperWidget/ThreadMapperWidget.entitlements
        CODE_SIGN_STYLE: "Automatic"
        DEVELOPMENT_TEAM: QCSX955Y7P

  ThreadMapperWatch:
    type: application
    platform: watchOS
    sources:
      - Sources/ThreadMapperWatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tintronixlab.ThreadMapper.watchkitapp
        INFOPLIST_FILE: Sources/ThreadMapperWatch/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/ThreadMapperWatch/ThreadMapperWatch.entitlements
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: ThreadMapperWatchWidget
        embed: true
      - sdk: WatchKit.framework
      - sdk: WatchConnectivity.framework
    scheme:
      shared: true

  ThreadMapperWatchWidget:
    type: app-extension
    platform: watchOS
    sources:
      - Sources/ThreadMapperWatchWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tintronixlab.ThreadMapper.watchkitapp.widget
        INFOPLIST_FILE: Sources/ThreadMapperWatchWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/ThreadMapperWatchWidget/ThreadMapperWatchWidget.entitlements
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework

  ThreadMapperTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests/ThreadMapperTests
    dependencies:
      - target: ThreadMapper
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tintronixlab.ThreadMapperTests
        GENERATE_INFOPLIST_FILE: YES