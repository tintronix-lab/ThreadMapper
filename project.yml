name: ThreadMapper
options:
  bundleIdPrefix: com.threadmapper
  deploymentTarget:
    iOS: "17.0"
  minimumXcodeGenVersion: "2.38.0"
  xcodeVersion: "15.0"

settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.threadmapper.app
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    SWIFT_VERSION: "5.9"
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""

targets:
  ThreadMapper:
    type: application
    platform: iOS
    sources:
      - Sources/ThreadMapper
      - Tests/ThreadMapperTests
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    info:
      path: Sources/ThreadMapper/Info.plist
      properties:
        NSHomeKitUsageDescription: "ThreadMapper needs HomeKit access to discover Thread devices and map mesh topology."
        NSLocationWhenInUseUsageDescription: "ThreadMapper uses location only to tag RSSI survey samples on the mesh map."
    entitlements:
      path: Sources/ThreadMapper/ThreadMapper.entitlements
      properties:
        com.apple.developer.homekit: true
    dependencies:
      - package: swift-charts
      - package: swift-collections

packages:
  swift-charts:
    url: "https://github.com/pointfreeco/swift-charts"
    from: "1.3.0"
  swift-collections:
    url: "https://github.com/apple/swift-collections"
    from: "1.1.0"
