name: ThreadMapper
options:
  bundleIdPrefix: com.tintronixlab
  deploymentTarget:
    iOS: "17.0"
  minimumXcodeGenVersion: "2.20"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5"
    CODE_SIGN_STYLE: "Automatic"
    DEVELOPMENT_TEAM: QCSX955Y7P

configs:
  Debug: debug
  Release: release

targets:
  ThreadMapper:
    type: application
    platform: iOS
    sources:
      - Sources/ThreadMapper
      - Sources/ThreadMapperApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tintronixlab.ThreadMapper
        INFOPLIST_FILE: Sources/ThreadMapper/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/ThreadMapper/ThreadMapper.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      signing:
        style: automatic
        team: QCSX955Y7Pi 
    scheme:
      shared: true

  ThreadMapperTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests/ThreadMapperTests
    dependencies:
      - target: ThreadMapper
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tintronixlab.ThreadMapperTests
